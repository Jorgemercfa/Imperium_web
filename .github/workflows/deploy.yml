name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Despliega cuando hagas push a main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # ðŸ‘ˆ Permiso necesario para hacer push a gh-pages

    steps:
    - name: Checkout source
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Build Vue project
      run: npm run build

    - name: Deploy to gh-pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # ðŸ‘ˆ Token necesario para permisos
        branch: gh-pages                   # Rama de destino
        folder: dist                       # Carpeta que se va a desplegar
